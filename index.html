<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #ffe0e0;
    overflow: hidden;
    font-family: sans-serif;
  }
  .heart {
    position: absolute;
    width: 60px; /* Adjust size */
    height: 60px; /* Adjust size */
    cursor: pointer;
    user-select: none;
    background-image: url('love.png'); /* <-- Replace with your image */
    background-size: cover;
    background-position: center;
    border-radius: 50%; /* optional */
  }
  .modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    max-width: 80%;
    display: none;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    z-index: 1000;
    font-size: 16px;
  }
</style>
</head>
<body>

<div id="modal" class="modal"></div>

<script>
const messages = [
  "Happy Birthday, my love 💖",
  "You make my days brighter 🌞",
  "I wish I could be there with you 😘",
  "You are the best part of my life 💀",
  "May all your dreams come true 🎉"
];

let current = 0;

function createHeart() {
  if(current >= messages.length) {
    finalMessage();
    return;
  }

  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.style.left = Math.random() * 80 + 'vw'; // random horizontal position
  document.body.appendChild(heart);

  let top = -80;
  const speed = 2 + Math.random() * 2; // pixels per frame

  function fall() {
    top += speed;
    heart.style.top = top + 'px';
    if(top < window.innerHeight) {
      requestAnimationFrame(fall);
    } else {
      heart.remove();
      createHeart();
    }
  }
  fall();

  // Mobile touch event
  heart.addEventListener('touchstart', function(e){
    e.stopPropagation();
    e.preventDefault();
    showMessage(heart, messages[current]);
    current++;
  });
}

function showMessage(heart, msg){
  const modal = document.getElementById('modal');
  modal.innerText = msg;
  modal.style.display = 'block';
  heart.style.display = 'none';

  modal.addEventListener('touchstart', function closeModal(){
    modal.style.display = 'none';
    heart.remove();
    modal.removeEventListener('touchstart', closeModal);
    createHeart();
  });
}

function finalMessage(){
  const modal = document.getElementById('modal');
  modal.innerHTML = "🎉 Happy Birthday, my queen! 🎉<br>Love you forever 💖";
  modal.style.display = 'block';
  modal.addEventListener('touchstart', function(){
    modal.style.display = 'none';
  });
}

// Start
createHeart();
</script>

</body>
</html>
