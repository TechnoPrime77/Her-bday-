<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to bottom, #ffdde1, #ee9ca7);
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .heart {
    position: absolute;
    width: 60px;
    height: 60px;
    cursor: pointer;
    user-select: none;
    background-image: url('love.png'); /* <-- Use a transparent PNG */
    background-size: cover;
    background-position: center;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .heart:active {
    transform: scale(1.2);
  }

  .modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    padding: 25px 20px;
    border-radius: 20px;
    text-align: center;
    max-width: 80%;
    display: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    font-size: 16px;
    z-index: 1000;
  }
</style>
</head>
<body>

<div id="modal" class="modal"></div>

<script>
const messages = [
  "Happy Birthday, my love 💖",
  "You make my days brighter 🌞",
  "I wish I could be there with you 😘",
  "You are the best part of my life 💀",
  "May all your dreams come true 🎉"
];

let current = 0;

function createHeart() {
  if(current >= messages.length) {
    finalMessage();
    return;
  }

  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.style.left = Math.random() * 80 + 'vw';
  document.body.appendChild(heart);

  let pos = -80;
  const speed = 1 + Math.random() * 1.5; // slower than before

  function fall() {
    pos += speed;
    heart.style.transform = `translateY(${pos}px)`;

    if(pos < window.innerHeight + 100) {
      requestAnimationFrame(fall);
    } else {
      heart.remove();
      createHeart();
    }
  }
  fall();

  heart.addEventListener('touchstart', function(e){
    e.stopPropagation();
    e.preventDefault();
    showMessage(heart, messages[current]);
    current++;
  });
}

function showMessage(heart, msg){
  const modal = document.getElementById('modal');
  modal.innerText = msg;
  modal.style.display = 'block';
  heart.style.display = 'none';

  modal.addEventListener('touchstart', function closeModal(){
    modal.style.display = 'none';
    heart.remove();
    modal.removeEventListener('touchstart', closeModal);
    createHeart();
  });
}

function finalMessage(){
  const modal = document.getElementById('modal');
  modal.innerHTML = "🎉 Happy Birthday, my queen! 🎉<br>Love you forever 💖";
  modal.style.display = 'block';
  modal.addEventListener('touchstart', function(){
    modal.style.display = 'none';
  });
}

// Start the first heart
createHeart();
</script>

</body>
</html>
