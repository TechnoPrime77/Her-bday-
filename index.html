<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch My Hearts ❤️</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:system-ui;
background:linear-gradient(180deg,#ff9a9e,#fad0c4);
}

/* top UI bar */

#ui{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.85);
padding:10px 18px;
border-radius:20px;
font-weight:600;
box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

/* heart style */

.heart{
position:absolute;
width:45px;
height:45px;
background:red;
transform:rotate(-45deg);
cursor:pointer;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:45px;
height:45px;
background:red;
border-radius:50%;
}

.heart:before{
top:-22px;
left:0;
}

.heart:after{
left:22px;
top:0;
}

/* heart animation */

@keyframes fall{
from{transform:translateY(-100px) rotate(-45deg)}
to{transform:translateY(110vh) rotate(-45deg)}
}

/* popup */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
padding:30px;
border-radius:25px;
width:80%;
max-width:320px;
text-align:center;
box-shadow:0 12px 35px rgba(0,0,0,0.3);
transition:0.35s;
}

#popup.show{
transform:translate(-50%,-50%) scale(1);
}

#message{
font-size:18px;
line-height:1.4;
}

/* final screen */

#finish{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(180deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
font-size:28px;
padding:40px;
display:none;
}

</style>
</head>

<body>

<div id="ui">0 / 5 collected</div>

<div id="popup">
<div id="message"></div>
<p style="margin-top:15px;font-size:14px;color:gray;">tap to continue</p>
</div>

<div id="finish">
<div>
🎉 Happy Birthday ❤️<br><br>
You caught every heart.<br>
Just like you caught mine.
</div>
</div>

<script>

const messages=[
"Happy Birthday ❤️",
"You make my world brighter",
"I wish I could celebrate with you today",
"You mean more to me than you know",
"I love you. Always."
]

let collected=0
let gamePaused=false

const ui=document.getElementById("ui")
const popup=document.getElementById("popup")
const messageBox=document.getElementById("message")

function updateUI(){
ui.innerText=`${collected} / ${messages.length} collected`
}

function spawnHeart(){

if(gamePaused) return

const heart=document.createElement("div")
heart.className="heart"

heart.style.left=Math.random()*85+"vw"

const duration=6+Math.random()*4
heart.style.animation=`fall ${duration}s linear`

document.body.appendChild(heart)

heart.addEventListener("touchstart",()=>{
if(gamePaused) return

gamePaused=true

heart.style.animationPlayState="paused"

messageBox.innerText=messages[collected]

popup.classList.add("show")

})

heart.addEventListener("animationend",()=>{
heart.remove()
})

}

popup.addEventListener("touchstart",()=>{

popup.classList.remove("show")

collected++

updateUI()

document.querySelectorAll(".heart").forEach(h=>h.remove())

gamePaused=false

if(collected>=messages.length){

document.getElementById("finish").style.display="flex"
return

}

spawnHeart()

})

function gameLoop(){

spawnHeart()

setInterval(()=>{
if(!gamePaused) spawnHeart()
},1400)

}

updateUI()

gameLoop()

</script>

</body>
</html>
